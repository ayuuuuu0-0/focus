<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fo.cus — daily command center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chivo:ital,wght@0,300;0,400;0,700;0,900;1,400&family=Martian+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="scanline" aria-hidden="true"></div>

  <div class="app">
    <header class="header reveal" style="--d: 0">
      <h1 class="logo" aria-label="focus">
        f<span class="logo-o">o<span class="logo-dot">.</span></span>cus
      </h1>
      <div class="header-meta">
        <time class="date-pill" id="dateDisplay">WED · JUN 3</time>
        <div class="goals-pill">
          <span class="goals-fill" id="goalsFill" style="width: 25%"></span>
          <span class="goals-text"><strong id="goalsDone">1</strong> / <span id="goalsTotal">4</span> goals done</span>
        </div>
        <button class="icon-btn" type="button" aria-label="Notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="grid">
      <section class="main-col">
        <div class="task-input-wrap reveal" style="--d: 1">
          <input
            type="text"
            class="task-input"
            id="taskInput"
            placeholder="what do you need to do today?"
            autocomplete="off"
            aria-label="New task"
          />
          <button class="time-btn" type="button" aria-label="Set time">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 6v6l4 2"/>
            </svg>
          </button>
          <button class="add-btn" type="button" id="addTaskBtn" aria-label="Add task">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5v14"/>
            </svg>
          </button>
        </div>

        <ul class="task-list" id="taskList" role="list"></ul>

        <nav class="week-nav reveal" style="--d: 3" aria-label="Week overview">
          <div class="week-days" id="weekDays"></div>
        </nav>
      </section>

      <aside class="sidebar">
        <article class="checkin-card reveal" style="--d: 2">
          <p class="checkin-q" id="checkinQuestion">
            how's <strong>system design notes</strong> going?
          </p>
          <div class="checkin-btns">
            <button type="button" class="checkin-btn checkin-track" data-mood="track">
              <span class="checkin-icon">↑</span>
              <span>on track</span>
            </button>
            <button type="button" class="checkin-btn checkin-struggle" data-mood="struggle">
              <span class="checkin-icon">↓</span>
              <span>struggling</span>
            </button>
            <button type="button" class="checkin-btn checkin-done" data-mood="done">
              <span class="checkin-icon">✓</span>
              <span>wrapped it up</span>
            </button>
          </div>
        </article>

        <section class="reminders reveal" style="--d: 3">
          <h2 class="section-label">reminders</h2>
          <div class="reminder-row">
            <label for="pingInterval">ping every</label>
            <select id="pingInterval" class="select-dark">
              <option value="30">30 min</option>
              <option value="60" selected>1 hr</option>
              <option value="120">2 hr</option>
            </select>
          </div>
          <div class="toggle-row">
            <span>sound</span>
            <label class="toggle">
              <input type="checkbox" id="soundToggle" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="toggle-row">
            <span>notifications</span>
            <label class="toggle">
              <input type="checkbox" id="notifToggle" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </section>

        <section class="stats-grid reveal" style="--d: 4">
          <div class="stat-card">
            <span class="stat-value" id="statDone">1/4</span>
            <span class="stat-label">done</span>
          </div>
          <div class="stat-card stat-streak">
            <span class="stat-value">🔥 <span id="statStreak">3</span></span>
            <span class="stat-label">day streak</span>
          </div>
          <div class="stat-card stat-active">
            <span class="stat-value" id="statActive">62%</span>
            <span class="stat-label">active goal</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="statTime">~3h</span>
            <span class="stat-label">left today</span>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
